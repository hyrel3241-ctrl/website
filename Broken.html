<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Blooming Flower</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(circle at center, #1b0a2a 0%, #05010a 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            padding: 15px 0;
        }

        /* Giant Flower Canvas */
        .flower-container {
            position: relative;
            width: 100%;
            height: 55vh; 
            display: flex;
            justify-content: center;
            align-items: flex-end;
            perspective: 1000px;
        }

        /* Thickened Stem */
        .stem {
            position: absolute;
            bottom: 0;
            width: 10px;
            height: 0;
            background: linear-gradient(to top, #133a1b, #276e36, #41a956);
            border-radius: 5px;
            transition: height 2.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            box-shadow: 0 0 15px rgba(65, 169, 86, 0.3);
        }

        /* Larger, Lush Leaves */
        .leaf {
            position: absolute;
            width: 75px;
            height: 45px;
            background: linear-gradient(135deg, #1b5e20, #4caf50);
            border-radius: 0 100px 10px 100px;
            opacity: 0;
            transform: scale(0) rotate(-30deg);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-origin: left bottom;
        }

        .leaf.left {
            left: -65px;
            top: 55%;
        }

        .leaf.right {
            right: -70px;
            top: 40%;
            transform: scale(0) rotate(30deg) scaleX(-1);
            transform-origin: right bottom;
        }

        /* Giant Flower Head Base */
        .flower-head {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%) scale(0) rotateX(45deg);
            width: 300px; 
            height: 300px;
            transform-origin: center center;
            transition: transform 3s cubic-bezier(0.34, 1.56, 0.64, 1) 2s;
            z-index: 2;
            transform-style: preserve-3d;
        }

        /* Large Radiant Center */
        .center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(15px);
            width: 55px;
            height: 55px;
            background: radial-gradient(circle, #fff 0%, #ffeb3b 40%, #e65100 100%);
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 0 40px #ffeb3b, 0 0 80px #ff5722;
        }

        /* Big Petals Custom Properties */
        .petal {
            position: absolute;
            left: 125px; 
            top: 0;
            width: 50px; 
            height: 160px; 
            background: linear-gradient(to top, rgba(142, 36, 170, 0.75), rgba(233, 30, 99, 0.95) 70%, rgba(255, 138, 101, 0.95));
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform-origin: bottom center;
            mix-blend-mode: screen;
            transition: transform 3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Outer Large Layer */
        .outer .petal {
            height: 150px;
            width: 54px;
            filter: drop-shadow(0 0 12px rgba(233, 30, 99, 0.4));
        }

        /* Inner Layer for Density */
        .inner .petal {
            height: 120px;
            width: 42px;
            left: 131px;
            top: 30px;
            background: linear-gradient(to top, rgba(233, 30, 99, 0.85), rgba(255, 64, 129, 0.95), rgba(255, 235, 59, 0.95));
        }

        /* Circular Distribution */
        .p1  { transform: rotate(0deg); }
        .p2  { transform: rotate(30deg); }
        .p3  { transform: rotate(60deg); }
        .p4  { transform: rotate(90deg); }
        .p5  { transform: rotate(120deg); }
        .p6  { transform: rotate(150deg); }
        .p7  { transform: rotate(180deg); }
        .p8  { transform: rotate(210deg); }
        .p9  { transform: rotate(240deg); }
        .p10 { transform: rotate(270deg); }
        .p11 { transform: rotate(300deg); }
        .p12 { transform: rotate(330deg); }

        /* Love Text Container */
        .love-container {
            text-align: center;
            min-height: 80px;
            margin-top: 10px;
            padding: 0 10px;
        }

        /* Text starts completely invisible */
        .love-main {
            font-size: 2.5rem;
            font-weight: 700;
            color: #ff4081;
            text-shadow: 0 0 15px rgba(255, 64, 129, 0.6), 0 0 35px rgba(255, 64, 129, 0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.5s ease-out;
            letter-spacing: 2px;
            margin: 0;
        }

        /* When this class gets added by JS, it fades in */
        .love-main.show-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Triggered Bloom States */
        .bloomed .stem {
            height: 200px; 
        }

        .bloomed .leaf.left {
            opacity: 1;
            transform: scale(1) rotate(-15deg);
            transition-delay: 1.5s;
        }

        .bloomed .leaf.right {
            opacity: 1;
            transform: scale(1) rotate(15deg) scaleX(-1);
            transition-delay: 1.8s;
        }

        .bloomed .flower-head {
            transform: translateX(-50%) scale(1.3) rotateX(0deg);
            animation: grandSway 6s ease-in-out infinite alternate 4.5s;
        }

        @keyframes grandSway {
            0% { transform: translateX(-50%) scale(1.3) rotate(-4deg); }
            100% { transform: translateX(-50%) scale(1.34) rotate(4deg); }
        }

        /* Button Layout Group */
        .btn-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 5px;
        }

        .bloom-btn {
            position: relative;
            padding: 14px 65px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.2);
            letter-spacing: 2px;
        }

        .bloom-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #e91e63, #8e24aa, #ff5722);
            z-index: 1;
        }

        .bloom-btn span {
            position: relative;
            z-index: 2;
        }

        .bloom-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 30, 99, 0.6);
        }
        
        .bloom-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <!-- Giant Flower Frame -->
    <div class="flower-container" id="garden">
        <div class="stem">
            <div class="leaf left"></div>
            <div class="leaf right"></div>
            
            <div class="flower-head">
                <div class="outer">
                    <div class="petal p1"></div><div class="petal p2"></div>
                    <div class="petal p3"></div><div class="petal p4"></div>
                    <div class="petal p5"></div><div class="petal p6"></div>
                    <div class="petal p7"></div><div class="petal p8"></div>
                    <div class="petal p9"></div><div class="petal p10"></div>
                    <div class="petal p11"></div><div class="petal p12"></div>
                </div>

                <div class="inner">
                    <div class="petal p1"></div><div class="petal p2"></div>
                    <div class="petal p3"></div><div class="petal p4"></div>
                    <div class="petal p5"></div><div class="petal p6"></div>
                    <div class="petal p7"></div><div class="petal p8"></div>
                    <div class="petal p9"></div><div class="petal p10"></div>
                    <div class="petal p11"></div><div class="petal p12"></div>
                </div>

                <div class="center"></div>
            </div>
        </div>
    </div>

    <!-- Message Area -->
    <div class="love-container">
        <h1 class="love-main" id="loveText">Flowers for you baby</h1>
    </div>

    <!-- Clickable Button -->
    <div class="btn-wrapper">
        <button class="bloom-btn" onclick="bloomFlower()">
            <span>PRESS</span>
        </button>
    </div>

    <script>
        function bloomFlower() {
            // 1. Grow and bloom the flower
            const garden = document.getElementById('garden');
            garden.classList.add('bloomed');

            // 2. Wait exactly 4.5 seconds for the blooming to finish, then show the text
            setTimeout(() => {
                const text = document.getElementById('loveText');
                text.classList.add('show-text');
            }, 4500); 
        }
    </script>

</body>
</html>
