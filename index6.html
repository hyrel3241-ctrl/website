<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stickman Street Fighter: Dual Impact Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #090a0f;
            color: #fff;
            font-family: 'Impact', 'Arial Black', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-wrapper {
            position: relative;
            width: 1000px;
            height: 520px;
            background: #111;
            border: 4px solid #ff3355;
            box-shadow: 0 0 30px rgba(255, 51, 85, 0.3);
            border-radius: 4px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Arcade Style Top HUD */
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }

        .fighter-side {
            width: 42%;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .health-container {
            background: #331010;
            border: 3px solid #fff;
            height: 26px;
            transform: skewX(-15deg);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .health-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(to bottom, #fff700, #ff2200);
            transition: width 0.05s linear;
        }

        #p1-side .health-bar {
            float: right;
        }

        #p2-side .health-bar {
            float: left;
        }

        /* Super Meter Bars */
        .meter-container {
            width: 70%;
            background: #112;
            border: 1px solid #00d2ff;
            height: 12px;
            transform: skewX(-15deg);
            overflow: hidden;
        }

        #p1-side .meter-container {
            align-self: flex-start;
            border-color: #00d2ff;
        }

        #p2-side .meter-container {
            align-self: flex-end;
            border-color: #ffaa00;
        }

        #p2-side .meter-bar {
            background: linear-gradient(to right, #ff5500, #ffcc00);
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #0055ff, #00d2ff);
            transition: width 0.2s ease;
        }

        .fighter-name {
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px #000;
            color: #00d2ff;
        }

        #p2-side .fighter-name {
            color: #ffaa00;
            text-align: right;
        }

        /* Keybind Overlay Layout Helpers */
        .controls-legend {
            position: absolute;
            bottom: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.75);
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 0.75rem;
            border-top: 1px solid #333;
            font-family: sans-serif;
            color: #ccc;
        }

        .legend-side b {
            color: #fff;
            font-family: 'Impact';
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .mana-txt {
            color: #00d2ff;
            font-weight: bold;
        }

        .mana-txt-p2 {
            color: #ffcc00;
            font-weight: bold;
        }

        /* Overlays */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 4px;
            font-style: italic;
            text-shadow: 4px 4px #000;
            text-align: center;
        }

        .start-btn {
            padding: 12px 50px;
            font-size: 1.5rem;
            background: #ff3355;
            color: #fff;
            border: none;
            cursor: pointer;
            font-family: 'Impact';
            font-style: italic;
            letter-spacing: 1px;
            border-radius: 4px;
        }

        .start-btn:hover {
            background: #fff;
            color: #ff3355;
        }
    </style>
</head>

<body>

    <div id="game-wrapper">
        <div id="ui-layer">
            <div class="fighter-side" id="p1-side">
                <div class="fighter-name">PLAYER 1</div>
                <div class="health-container">
                    <div id="p1-bar" class="health-bar"></div>
                </div>
                <div class="meter-container">
                    <div id="p1-meter" class="meter-bar"></div>
                </div>
            </div>
            <div style="font-size: 2rem; color: #fff; font-style: italic; padding-top: 5px;">VS</div>
            <div class="fighter-side" id="p2-side">
                <div class="fighter-name">PLAYER 2</div>
                <div class="health-container">
                    <div id="p2-bar" class="health-bar"></div>
                </div>
                <div class="meter-container">
                    <div id="p2-meter" class="meter-bar"></div>
                </div>
            </div>
        </div>

        <div class="controls-legend">
            <div class="legend-side"><b class="p1-color">P1:</b> A/D=Move | S=Block | Space=Jump | Q=Punch | W=Kick |
                E=Upper | T=AxeKick | F=Dash <br> R=Kamehameha (<span class="mana-txt">25 Mana</span>) | G=SUPER (<span
                    class="mana-txt">100 Mana</span>)</div>

            <div class="legend-side" style="text-align: right;"><b class="p2-color">P2 (NUMPAD):</b> 4/6=Move | 5=Block
                | 8=Jump | 7=Punch | 9=Kick | 1=Upper | 3=AxeKick <br> 0=Dash | /=Kamehameha (<span
                    class="mana-txt-p2">25 Mana</span>) | *=SUPER (<span class="mana-txt-p2">100 Mana</span>)</div>
        </div>

        <canvas id="stageCanvas"></canvas>

        <div id="end-screen" class="overlay-screen" style="display: none;">
            <h1 id="end-title">VICTORY</h1>
            <button class="start-btn" style="margin-top:20px;" onclick="initMatch()">REMATCH</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stageCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1000; canvas.height = 500;

        let p1, p2, projectiles = [], effects = [], gameRunning = false;

        let keys = {
            KeyA: false, KeyD: false, KeyS: false,
            Numpad4: false, Numpad6: false, Numpad5: false
        };

        let shakeTime = 0, shakeIntensity = 0;
        let hitStopFrames = 0;

        class Fighter {
            constructor(x, id, color) {
                this.x = x; this.y = 390; this.vx = 0; this.vy = 0;
                this.id = id; this.hp = 100; this.meter = 0;
                this.dir = id === 1 ? 1 : -1;
                this.state = 'idle';
                this.stateTimer = 0; this.attackType = '';
                this.groundY = 390;
                this.color = color;
                this.trail = [];
            }

            update(opponent) {
                if (this.y < this.groundY) {
                    this.vy += 1.4;
                    this.state = 'airborne';
                } else {
                    this.y = this.groundY; this.vy = 0;
                    if (this.state === 'airborne') this.state = 'idle';
                }

                if (this.state !== 'hit' && this.state !== 'attacking') {
                    let isMovingLeft = this.id === 1 ? keys.KeyA : keys.Numpad4;
                    let isMovingRight = this.id === 1 ? keys.KeyD : keys.Numpad6;
                    let isBlocking = this.id === 1 ? keys.KeyS : keys.Numpad5;

                    if (isBlocking && this.y === this.groundY) {
                        this.state = 'blocking';
                        this.vx *= 0.5;
                    } else if (isMovingLeft) {
                        this.vx = -6; this.state = 'walking';
                    } else if (isMovingRight) {
                        this.vx = 6; this.state = 'walking';
                    } else {
                        this.vx *= 0.7;
                        if (this.state === 'walking') this.state = 'idle';
                    }
                } else if (this.state === 'idle' || this.state === 'walking') {
                    this.vx *= 0.7;
                }

                this.x += this.vx; this.y += this.vy;

                if (this.x < 40) this.x = 40;
                if (this.x > canvas.width - 40) this.x = canvas.width - 40;

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 6) this.trail.shift();

                if (this.state !== 'attacking' && this.state !== 'hit' && this.state !== 'blocking') {
                    this.dir = (this.x < opponent.x) ? 1 : -1;
                }

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer <= 0 && (this.state === 'attacking' || this.state === 'hit')) this.state = 'idle';
                }
            }

            performAttack(type) {
                if ((this.state === 'attacking' && type !== 'super') || this.state === 'hit') return;

                if (type === 'super') {
                    if (this.meter < 100) return;
                    this.meter = 0;
                    this.updateMeterHUD();
                    triggerCameraShake(25, 12);
                }

                if (type === 'kamehameha') {
                    if (this.meter < 25) return;
                    this.meter -= 25;
                    this.updateMeterHUD();
                }

                this.state = 'attacking';
                this.attackType = type;

                if (type === 'punch') {
                    this.stateTimer = 12; this.vx = this.dir * 7;
                    checkHitbox(this, 70, 30, -55, 6, 'punch');
                } else if (type === 'kick') {
                    this.stateTimer = 16; this.vx = this.dir * 10;
                    checkHitbox(this, 85, 30, -30, 10, 'kick');
                } else if (type === 'uppercut') {
                    this.stateTimer = 26; this.vy = -18; this.vx = this.dir * 5;
                    checkHitbox(this, 70, 80, -90, 16, 'uppercut');
                } else if (type === 'axekick') {
                    this.stateTimer = 22; this.vy = -6; this.vx = this.dir * 11;
                    checkHitbox(this, 80, 85, -80, 18, 'axekick');
                } else if (type === 'dash') {
                    this.stateTimer = 10; this.vx = this.dir * 28;
                    createSparks(this.x, this.y - 40, this.color, 5);
                } else if (type === 'kamehameha') {
                    this.stateTimer = 25;
                    projectiles.push(new KamehamehaWave(this.x + (this.dir * 45), this.y - 50, this.dir, this.color, this.id));
                } else if (type === 'super') {
                    this.stateTimer = 45; this.vx = this.dir * 20;
                    checkHitbox(this, 130, 90, -90, 35, 'super');
                }
            }

            takeDamage(amount, kX, kY) {
                if (this.state === 'blocking') {
                    amount = Math.floor(amount * 0.15);
                    kX *= 0.2; kY = 0;
                    createSparks(this.x + (this.dir * 20), this.y - 50, '#ffffff', 4);
                } else {
                    this.state = 'hit'; this.stateTimer = 24;
                    this.vx = kX; this.vy = kY;
                    triggerCameraShake(15, Math.abs(amount) > 15 ? 10 : 5);
                    hitStopFrames = Math.abs(amount) > 15 ? 8 : 4;
                    createSparks(this.x, this.y - 50, this.id === 1 ? '#00d2ff' : '#ffaa00', 12);
                }

                this.hp = Math.max(0, this.hp - amount);
                this.meter = Math.min(100, this.meter + amount * 0.7);
                this.updateMeterHUD();

                let attacker = this.id === 1 ? p2 : p1;
                attacker.meter = Math.min(100, attacker.meter + amount * 0.4);
                attacker.updateMeterHUD();

                document.getElementById(this.id === 1 ? 'p1-bar' : 'p2-bar').style.width = this.hp + '%';
                if (this.hp <= 0) endGame(this.id);
            }

            updateMeterHUD() {
                document.getElementById(this.id === 1 ? 'p1-meter' : 'p2-meter').style.width = this.meter + '%';
            }

            draw() {
                ctx.save();
                ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.strokeStyle = this.color;

                this.trail.forEach((t, i) => {
                    ctx.globalAlpha = (i + 1) * 0.08;
                    ctx.beginPath(); ctx.arc(t.x, t.y - 80, 14, 0, Math.PI * 2); ctx.stroke();
                });
                ctx.globalAlpha = 1.0;

                let hY = this.y - 80, cY = this.y - 50, pY = this.y - 30;

                ctx.beginPath(); ctx.arc(this.x, hY, 14, 0, Math.PI * 2);
                ctx.fillStyle = this.state === 'blocking' ? '#fff' : this.color;
                ctx.fill(); ctx.stroke();

                ctx.beginPath(); ctx.moveTo(this.x, hY + 14); ctx.lineTo(this.x, pY); ctx.stroke();

                let lHX = this.x - 16, lHY = cY + 8, rHX = this.x + 16, rHY = cY + 8;
                let lFX = this.x - 15, lFY = this.y, rFX = this.x + 15, rFY = this.y;

                if (this.state === 'blocking') {
                    lHX = this.x + (this.dir * 15); lHY = hY + 10;
                    rHX = this.x + (this.dir * 20); rHY = hY - 5;
                } else if (this.state === 'attacking') {
                    if (this.attackType === 'punch') { rHX = this.x + (this.dir * 55); rHY = cY - 15; }
                    else if (this.attackType === 'kick') { rFX = this.x + (this.dir * 65); rFY = pY - 10; }
                    else if (this.attackType === 'uppercut') { rHX = this.x + (this.dir * 10); rHY = hY - 45; }
                    else if (this.attackType === 'axekick') { rFX = this.x + (this.dir * 45); rFY = hY - 30; }
                    else if (this.attackType === 'kamehameha') { rHX = this.x + (this.dir * 45); rHY = cY - 5; lHX = this.x + (this.dir * 35); lHY = cY + 10; }
                    else if (this.attackType === 'super') { rHX = this.x + (this.dir * 70); rHY = cY - 5; ctx.strokeStyle = '#ffcc00'; }
                } else if (this.state === 'hit') {
                    lHX = this.x - (this.dir * 25); lHY = hY; rHX = this.x - (this.dir * 15); rHY = hY - 15;
                }

                ctx.beginPath(); ctx.moveTo(this.x, cY); ctx.lineTo(lHX, lHY);
                ctx.moveTo(this.x, cY); ctx.lineTo(rHX, rHY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x, pY); ctx.lineTo(lFX, lFY);
                ctx.moveTo(this.x, pY); ctx.lineTo(rFX, rFY); ctx.stroke();
                ctx.restore();
            }
        }

        class KamehamehaWave {
            constructor(x, y, dir, color, ownerId) {
                this.x = x; this.y = y; this.dir = dir; this.color = color; this.ownerId = ownerId;
                this.speed = dir * 16; this.active = true;
            }
            update(opp) {
                this.x += this.speed;
                if (this.x < -50 || this.x > canvas.width + 50) {
                    this.active = false;
                    return;
                }

                if (Math.abs(this.x - opp.x) < 40 && Math.abs(this.y - (opp.y - 50)) < 60) {
                    this.active = false;
                    opp.takeDamage(15, this.dir * 14, -4);
                }
            }
            draw() {
                ctx.save();
                ctx.shadowBlur = 25;
                ctx.shadowColor = this.color;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 22, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function checkHitbox(atkr, w, h, offsetTop, dmg, type) {
            let opp = atkr.id === 1 ? p2 : p1;
            let boxX = atkr.dir === 1 ? atkr.x : atkr.x - w;
            let boxY = atkr.y + offsetTop;

            if (boxX + w > opp.x - 25 && boxX < opp.x + 25 && boxY + h > opp.y - 90 && boxY < opp.y) {
                let kX = atkr.dir * (type === 'kick' ? 18 : (type === 'super' ? 25 : (type === 'axekick' ? 14 : 8)));
                let kY = type === 'uppercut' ? -22 : (type === 'super' ? -8 : (type === 'axekick' ? 12 : -3));
                opp.takeDamage(dmg, kX, kY);
            }
        }

        function createSparks(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                effects.push({
                    x: x, y: y, vx: (Math.random() - 0.5) * 14, vy: (Math.random() - 0.5) * 14,
                    life: 20, color: color, size: Math.random() * 4 + 2
                });
            }
        }

        function triggerCameraShake(time, intensity) {
            shakeTime = time; shakeIntensity = intensity;
        }

        window.addEventListener('keydown', e => {
            if (!gameRunning) return;

            // Prevent standard browser interactions for action keys
            if (["Space", "Numpad8", "Numpad5", "Numpad4", "Numpad6", "Slash"].includes(e.code)) {
                e.preventDefault();
            }

            // --- PLAYER 1 CONTROLS ---
            if (e.code === 'KeyA') keys.KeyA = true;
            if (e.code === 'KeyD') keys.KeyD = true;
            if (e.code === 'KeyS') keys.KeyS = true;
            if (e.code === 'Space') {
                if (p1.y === p1.groundY && p1.state !== 'hit' && p1.state !== 'attacking') p1.vy = -21;
            }
            if (e.code === 'KeyQ') p1.performAttack('punch');
            if (e.code === 'KeyW') p1.performAttack('kick');
            if (e.code === 'KeyE') p1.performAttack('uppercut');
            if (e.code === 'KeyR') p1.performAttack('kamehameha');
            if (e.code === 'KeyT') p1.performAttack('axekick');
            if (e.code === 'KeyF') p1.performAttack('dash');
            if (e.code === 'KeyG') p1.performAttack('super');

            // --- PLAYER 2 NUMPAD CONTROLS ---
            if (e.code === 'Numpad4') keys.Numpad4 = true;
            if (e.code === 'Numpad6') keys.Numpad6 = true;
            if (e.code === 'Numpad5') keys.Numpad5 = true;
            if (e.code === 'Numpad8') {
                if (p2.y === p2.groundY && p2.state !== 'hit' && p2.state !== 'attacking') p2.vy = -21;
            }
            if (e.code === 'Numpad7') p2.performAttack('punch');
            if (e.code === 'Numpad9') p2.performAttack('kick');
            if (e.code === 'Numpad1') p2.performAttack('uppercut');
            if (e.code === 'Numpad3') p2.performAttack('axekick');
            if (e.code === 'Numpad0') p2.performAttack('dash');
            if (e.code === 'NumpadDivide') p2.performAttack('kamehameha');
            if (e.code === 'NumpadMultiply') p2.performAttack('super');
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'KeyA') keys.KeyA = false;
            if (e.code === 'KeyD') keys.KeyD = false;
            if (e.code === 'KeyS') keys.KeyS = false;

            if (e.code === 'Numpad4') keys.Numpad4 = false;
            if (e.code === 'Numpad6') keys.Numpad6 = false;
            if (e.code === 'Numpad5') keys.Numpad5 = false;
        });

        function initMatch() {
            p1 = new Fighter(250, 1, '#00d2ff');
            p2 = new Fighter(750, 2, '#ffaa00');
            projectiles = []; effects = [];
            keys = { KeyA: false, KeyD: false, KeyS: false, Numpad4: false, Numpad6: false, Numpad5: false };

            document.getElementById('p1-bar').style.width = '100%';
            document.getElementById('p2-bar').style.width = '100%';
            p1.updateMeterHUD(); p2.updateMeterHUD();

            document.getElementById('end-screen').style.display = 'none';

            gameRunning = true;
            requestAnimationFrame(updateLoop);
        }

        function updateLoop() {
            if (!gameRunning) return;

            if (hitStopFrames > 0) {
                hitStopFrames--;
                requestAnimationFrame(updateLoop);
                return;
            }

            ctx.save();
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeIntensity;
                let dy = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(dx, dy); shakeTime--;
            }

            ctx.fillStyle = '#14161f'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0b0c10'; ctx.fillRect(0, 390, canvas.width, canvas.height - 390);
            ctx.strokeStyle = '#ff3355'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, 390); ctx.lineTo(canvas.width, 390); ctx.stroke();

            p1.update(p2); p2.update(p1);

            for (let i = projectiles.length - 1; i >= 0; i--) {
                let p = projectiles[i];
                p.update(p.ownerId === 1 ? p2 : p1);
                if (p.active) {
                    p.draw();
                } else {
                    projectiles.splice(i, 1);
                }
            }

            effects.forEach((eff, idx) => {
                eff.x += eff.vx; eff.y += eff.vy; eff.life--;
                ctx.fillStyle = eff.color;
                ctx.fillRect(eff.x, eff.y, eff.size, eff.size);
                if (eff.life <= 0) effects.splice(idx, 1);
            });

            p1.draw(); p2.draw();
            ctx.restore();

            requestAnimationFrame(updateLoop);
        }

        function endGame(loserId) {
            gameRunning = false;
            const t = document.getElementById('end-title');
            let winnerText = loserId === 1 ? "PLAYER 2 WINS" : "PLAYER 1 WINS";
            t.innerText = winnerText;
            t.style.color = loserId === 1 ? "#ffaa00" : "#00d2ff";
            document.getElementById('end-screen').style.display = 'flex';
        }

        window.onload = () => {
            initMatch();
        };
    </script>
</body>

</html>
