<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121214;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* Initial prompt message */
        #prompt-text {
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #a1a1aa;
            animation: pulse 1.5s infinite alternate;
            transition: opacity 0.5s ease;
        }

        /* The hidden picture setup */
        #kitten-pic {
            max-width: 400px;
            width: 90%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 3px solid #ff4a6b;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: none;
        }

        /* The hidden text setup */
        #surprise-text {
            font-size: 2rem;
            font-weight: bold;
            color: #ff4a6b;
            text-shadow: 0 2px 10px rgba(255, 74, 107, 0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }

        /* Trigger classes for animations */
        #kitten-pic.reveal {
            display: block;
            /* Small micro-task delay to allow display block to register for transition */
            setTimeout: 10ms; 
        }

        #surprise-text.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="container">
        <!-- Step 1: Prompt -->
        <div id="prompt-text">👉 Press any key on your keyboard...</div>

        <!-- Step 2: The Picture -->
        <img id="kitten-pic" src="program.webp" alt="Cute Kitten with Rose">

        <!-- Step 3: The Text after the picture -->
        <div id="surprise-text">A rose for you! 🌹</div>
    </div>

    <script>
        let activated = false;

        window.addEventListener('keydown', () => {
            // Prevent restarting if they spam keys
            if (activated) return;
            activated = true;

            const prompt = document.getElementById('prompt-text');
            const pic = document.getElementById('kitten-pic');
            const text = document.getElementById('surprise-text');

            // 1. Hide the instruction prompt
            prompt.style.opacity = '0';
            
            setTimeout(() => {
                prompt.style.display = 'none';
                
                // 2. Bring in the picture smoothly
                pic.style.display = 'block';
                // Slight delay so browser registers display:block before rendering animation opacity
                setTimeout(() => {
                    pic.style.opacity = '1';
                    pic.style.transform = 'scale(1)';
                }, 50);

                // 3. Bring in the text shortly AFTER the picture arrives
                setTimeout(() => {
                    text.classList.add('reveal');
                }, 1000); // 1000ms = 1 second delay after picture starts appearing

            }, 500);
        });
    </script>
</body>
</html>
