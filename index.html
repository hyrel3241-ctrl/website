<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Heart for You</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(circle at center, #2a0813 0%, #0a0105 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            padding: 20px 0;
        }

        /* Heart Canvas Area */
        .heart-container {
            position: relative;
            width: 100%;
            height: 50vh; 
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* The Magic Heart Shape */
        .heart {
            position: relative;
            width: 140px;
            height: 140px;
            background-color: #ff2a6d;
            transform: scale(0) rotate(-45deg); /* Starts hidden/invisible */
            transform-origin: center center;
            transition: all 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: -10px 10px 90px #ff2a6d, 0 0 30px #ff71ce;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            background-color: #ff2a6d;
            border-radius: 50%;
        }

        .heart::before {
            top: -70px;
            left: 0;
        }

        .heart::after {
            top: 0;
            left: 70px;
        }

        /* Triggered Heart Activation Style */
        .activated .heart {
            transform: scale(1.1) rotate(-45deg);
            animation: heartBeat 1.4s infinite alternate 2.5s; /* Starts breathing after growing */
        }

        /* Romantic Beating/Breathing Loop */
        @keyframes heartBeat {
            0% {
                transform: scale(1) rotate(-45deg);
                box-shadow: -10px 10px 70px #ff2a6d, 0 0 20px #ff71ce;
            }
            100% {
                transform: scale(1.15) rotate(-45deg);
                box-shadow: -10px 10px 110px #ff2a6d, 0 0 50px #ff71ce, 0 0 100px #05d9e8;
            }
        }

        /* Love Text Styling Area */
        .love-container {
            text-align: center;
            min-height: 90px;
            padding: 0 15px;
        }

        /* Hidden text setting */
        .love-main {
            font-size: 2.6rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 10px #ff71ce, 0 0 30px #ff2a6d, 0 0 50px #01012b;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1.8s ease-out;
            letter-spacing: 3px;
            margin: 0;
        }

        /* Dynamic Javascript Text Fade class */
        .love-main.show-text {
            opacity: 1;
            transform: translateY(0);
        }

        /* Interactive Bottom Button styling */
        .btn-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }

        .press-btn {
            position: relative;
            padding: 15px 70px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            background: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 20px rgba(255, 42, 109, 0.3);
            letter-spacing: 3px;
        }

        .press-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, #ff2a6d, #9b5de5, #05d9e8);
            z-index: 1;
        }

        .press-btn span {
            position: relative;
            z-index: 2;
        }

        .press-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(255, 42, 109, 0.7);
        }
        
        .press-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heartCanvas">
        <div class="heart"></div>
    </div>

    <div class="love-container">
        <h1 class="love-main" id="message">You have my whole heart</h1>
    </div>

    <div class="btn-wrapper">
        <button class="press-btn" onclick="activateLove()">
            <span>PRESS</span>
        </button>
    </div>

    <script>
        function activateLove() {
            // 1. Instantly trigger the neon heart growth sequence
            const canvas = document.getElementById('heartCanvas');
            canvas.classList.add('activated');

            // 2. Wait exactly 3 seconds for growth stabilization, then smoothly paint the text 
            setTimeout(() => {
                const text = document.getElementById('message');
                text.classList.add('show-text');
            }, 3000); 
        }
    </script>

</body>
</html>
