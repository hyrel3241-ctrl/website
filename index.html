<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0b0c;
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
        }

        /* Initial dynamic prompt styling */
        #prompt-text {
            font-size: 1.4rem;
            color: #a1a1aa;
            animation: pulse 1.2s infinite alternate;
        }

        /* The Prank Image */
        #finger-img {
            max-width: 200px;
            display: none;
        }

        /* The Love Cat Image */
        #cat-img {
            max-width: 420px;
            width: 90%;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(255, 51, 102, 0.25);
            border: 4px solid #ff3366;
            display: none;
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 0.6s ease-out, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Love text layout styling */
        #love-text {
            font-size: 2.2rem;
            font-weight: 800;
            color: #ff3366;
            margin-top: 25px;
            text-shadow: 0 4px 15px rgba(255, 51, 102, 0.4);
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        @keyframes pulse {
            from { opacity: 0.3; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="prompt-text">Press any key for a surprise... 😉</div>

        <img id="finger-img" src="image_5b60c3.png" alt="Prank finger">

        <img id="cat-img" src="mwah mwah.webp" alt="Kissing Cat">

        <div id="love-text">kiss for LOVE OF MY LIFE. 💋❤️</div>
    </div>

    <script>
        let triggered = false;

        window.addEventListener('keydown', () => {
            if (triggered) return; // Prevent multi-key spamming resets
            triggered = true;

            const prompt = document.getElementById('prompt-text');
            const finger = document.getElementById('finger-img');
            const cat = document.getElementById('cat-img');
            const text = document.getElementById('love-text');

            // 1. Instantly remove instructions and flash the prank image
            prompt.style.display = 'none';
            finger.style.display = 'block';

            // 2. Wait exactly 400 milliseconds (fast prank flash) then swap to the love cat
            setTimeout(() => {
                finger.style.display = 'none';
                cat.style.display = 'block';
                
                // Allow browser drawing engine cycle to capture CSS smooth transitions
                setTimeout(() => {
                    cat.style.opacity = '1';
                    cat.style.transform = 'scale(1)';
                }, 20);

                // 3. Bring the sweet text down shortly right after the cat kisses
                setTimeout(() => {
                    text.style.display = 'block';
                    setTimeout(() => {
                        text.style.opacity = '1';
                        text.style.transform = 'translateY(0)';
                    }, 20);
                }, 600);

            }, 400); 
        });
    </script
</body>
</html>
