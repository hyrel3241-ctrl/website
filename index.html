<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Gift For You</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff0f5; /* Soft lavender blush */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #display-text {
            font-size: 2rem;
            color: #ff8da1;
            font-weight: bold;
            margin-bottom: 20px;
            /* Fast transition for when the text itself changes */
            transition: color 0.5s ease; 
        }

        /* Initial state for the image container (hidden and shrunk) */
        #image-container {
            opacity: 0;
            transform: scale(0.9);
            transition: opacity 2.5s ease, transform 2.5s ease; /* Slow, smooth 2.5 second appearance */
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none; /* Prevents interaction until visible */
        }

        /* The class we add with JavaScript to trigger the slow fade-in */
        #image-container.reveal {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        #wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        img {
            max-width: 90%;
            max-height: 65vh;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.5);
            border: 6px solid white;
        }

        /* Simple breathing animation for the prompt */
        .pulse {
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <!-- This text changes when a key is pressed -->
        <div id="display-text" class="pulse">✨ Press any key for a surprise... ✨</div>

        <!-- The image container that slowly appears -->
        <div id="image-container">
            <img src="/cute.jpg" alt="Cute Kittens">
        </div>
    </div>

    <script>
        window.addEventListener('keydown', function() { 
            const textElement = document.getElementById('display-text');
            const imageContainer = document.getElementById('image-container');

            // Remove the pulsing effect and update the text instantly
            textElement.classList.remove('pulse');
            textElement.style.color = '#ff4757'; // Changes to a warmer sweet pink
            textElement.innerHTML = "Gifts for you baby 💝🐾";

            // Trigger the slow fade-in animation for the picture
            imageContainer.classList.add('reveal');
        }, { once: true }); // Ensures it only happens on the very first keypress
    </script>

</body>
</html>
