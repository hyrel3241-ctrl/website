<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Friend</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1b 100%);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            padding: 20px 0;
        }

        /* Container Area */
        .emoji-container {
            position: relative;
            width: 100%;
            height: 50vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Emoji - Starts hidden above the screen */
        .middle-finger {
            font-size: 8rem; /* Big emoji */
            transform: translateY(-100vh) scale(0.5);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
            user-select: none;
        }

        /* Dropping/Bouncing Animation when activated */
        .activated .middle-finger {
            opacity: 1;
            transform: translateY(0) scale(1.3);
            animation: gentleShake 2s ease-in-out infinite alternate 1.2s;
        }

        @keyframes gentleShake {
            0% { transform: scale(1.3) rotate(-3deg); }
            100% { transform: scale(1.35) rotate(3deg); }
        }

        /* Text Area */
        .text-container {
            text-align: center;
            min-height: 90px;
            padding: 0 15px;
        }

        /* Hidden at start */
        .friend-text {
            font-size: 4rem;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 0 0 15px rgba(255, 51, 51, 0.6), 0 0 30px rgba(0, 0, 0, 0.8);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 4px;
            margin: 0;
        }

        /* Pops out after emoji lands */
        .friend-text.show-text {
            opacity: 1;
            transform: scale(1);
        }

        /* Button Styling */
        .btn-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 10px;
        }

        .press-btn {
            position: relative;
            padding: 15px 70px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            background: #222;
            border: 2px solid #ff3333;
            border-radius: 30px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.2);
            letter-spacing: 3px;
        }

        .press-btn:hover {
            transform: translateY(-3px);
            background: #ff3333;
            box-shadow: 0 8px 25px rgba(255, 51, 51, 0.6);
        }
        
        .press-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="emoji-container" id="stage">
        <div class="middle-finger">🖕</div>
    </div>

    <div class="text-container">
        <h1 class="friend-text" id="friendText">BADING</h1>
    </div>

    <div class="btn-wrapper">
        <button class="press-btn" onclick="dropSurprise()">
            <span>PRESS</span>
        </button>
    </div>

    <script>
        function dropSurprise() {
            // 1. Drop the emoji with animation
            const stage = document.getElementById('stage');
            stage.classList.add('activated');

            // 2. Wait 1.2 seconds for the drop to hit, then pop out the text
            setTimeout(() => {
                const text = document.getElementById('friendText');
                text.classList.add('show-text');
            }, 1200); 
        }
    </script>

</body>
</html>
